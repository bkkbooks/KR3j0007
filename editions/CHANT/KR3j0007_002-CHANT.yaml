body:
  text: 公孫龍子卷中指物論第三物莫非指而指非指天下無指物無可以謂物非指者天下而物可謂指乎指也者天下之所無也物也者天下之所有也以天下之所有為天下之所無未可天下無指而物不可謂指也不可謂指者非指也非指者物莫非指也天下無指而物不可謂指者非有非指也非有非指者物莫非指也物莫非指者而指非指也天下無指者生於物之各有名不為指也不為指而謂之指是兼不為指以有不為指之無不為指未可且指者天下之所兼天下無指者物不可謂無指也不可謂無指者非有非指也非有非指者物莫非指指非非指也指與物非指也使天下無物指誰徑謂非指天下無物誰徑謂指天下有指無物指誰徑謂非指徑謂無物非指且夫指固自為非指奚待於物而乃與為指通變論第四曰二有一乎曰二無一曰二有右乎曰二無右曰二有左乎曰二無左曰右可謂二乎曰不可曰左可謂二乎曰不可曰左與右可謂二乎曰可曰謂變非不變可乎曰可曰右有與可謂變乎曰可曰變隻曰右曰右苟變安可謂右苟不變安可謂變二苟無左又無右二者左與右奈何曰羊合牛非馬牛合羊非雞曰何哉曰羊與牛唯異羊有齒牛無齒而羊牛之非羊也之非牛也未可是不俱有而或類焉羊有角牛有角牛之而羊也羊之而牛也未可是俱有而類之不同也羊牛有角馬無角馬有尾羊牛無尾故曰羊合牛非馬也非馬者無馬也無馬者羊不二牛不二而羊牛二是而羊而牛非馬可也若舉而以是猶類之不同若左右猶是舉牛羊有毛雞有羽謂雞足一數足二二而一故三謂牛羊足一數足四四而一故五牛羊足五雞足三故曰牛合羊非雞非有以非雞也與馬以雞寧馬材不材其無以類審矣舉是謂亂名是狂舉曰他辯曰青以白非黃白以青非碧曰何哉曰青白不相與而相與反對也不相鄰而相鄰不害其方也不害其方者反而對各當其所若左右不驪故一於青不可一於白不可惡乎其有黃矣哉黃其正矣是正舉也其有君臣之於國焉故強壽矣而且青驪乎白而白不勝也白足以勝矣而不勝是木賊金也木賊金者碧碧則非正舉矣青白不相與而相與不相勝則兩明也爭而明其色碧也與其碧寧黃黃其馬也其與類乎碧其雞也其與暴乎暴則君臣爭而兩明也兩明者昏不明非正舉也非正舉者名實無當驪色章焉故曰兩明也兩明而道喪其無有以正焉
