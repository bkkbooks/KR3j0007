body:
  text: 公孫龍子鬼谷子公孫龍子提要臣等謹案公孫龍子一卷周公孫龍撰按史記趙有公孫龍為堅白異同之辯漢書萟文志龍與毛公等並游平原君之門列子釋文龍字子秉莊子謂惠子曰儒墨楊秉四與夫子為五秉即龍也據此則龍當為戰國時人司馬貞索隠謂龍即仲尼弟子者非也其書漢志著録者十四篇至宋時八篇已亡今僅存跡府白馬指物通變堅白名實凡六篇其首章所載與孔穿辯論事孔叢子亦有之謂龍為穿所絀而此書又謂穿願為弟子彼此互異蓋戰國時門户角立各欲自尊其説故其不同如此其書大指疾名器乖實乃假指物以混是非借白馬而齊物我冀時君有悟而正名實故諸史皆列於名家淮南鴻烈解稱公孫龍粲於辭而貿名楊子法言稱公孫龍詭辭數萬蓋其持論雄贍惝怳恣肆實足以聳動天下故當時莊列荀卿並著其言為學術之一特品目稱謂之間紛然不可數計龍必欲一一核其真而理䆒不足以相勝故言愈辯而名實愈不可正然其書出自先秦義雖恢誕而文頗離奇可喜陳振孫槩以淺陋迂僻譏之則又過矣明鍾惺刻此書改其名為辯言妄誕不經今仍從漢志題曰公孫龍子又鄭樵通志畧載此書有陳嗣古注賈士隠注各一卷今俱失傳此本之注乃宋謝希深所撰文義頗淺近今亦仍之焉鬼谷子提要臣等謹案鬼谷子漢志不著録隋志縱横家有鬼谷三卷註曰周世隠於鬼谷玉海引中興書目曰周時髙士無鄉里族姓名字以其所隠自號鬼谷先生蘇秦張儀事之授以捭闔至符言等十有二篇及轉丸本經持樞中經等篇因隋志之説也唐志卷數相同而註曰蘇秦撰張守節史記正義曰鬼谷在雒州陽城縣北五里七録有蘇秦書樂壹註云秦欲神秘其道故假名鬼谷此又唐志之所本胡應麟筆叢則謂隋志有蘇秦三十一篇張儀十篇必東漢人本二書之言薈稡為此而託於鬼谷若子虛亡是之屬其言頗為近理然亦終無確證隋志稱皇甫謐註則為魏晉以來書固無疑耳説苑引鬼谷子有人之不善而能矯之者難矣一語今本不載又惠洪冷齊夜話引鬼谷子曰崖蜜櫻桃也今本亦不載疑非其舊然今本已佚其轉丸胠篋二篇惟存捭闔至符言十二篇向所引者或在佚篇之内至惠洪所引據王直方詩話乃金樓子之文惠洪誤以為鬼谷子耳案王直方詩話今無全本此條見朱翌猗覺寮雜志所引均不足以致疑也髙似孫子畧稱其一闔一闢為易之神一翕一張為老氏之術出於戰國諸人之表誠為過當宋濂潛溪集詆為蛇䑕之智又謂其文淺近不類戰國時人又抑之太甚柳宗元辨鬼谷子以為言益竒而道益陿差得其真蓋其術雖不足道其文之竒變詭偉要非後世所能為也乾隆四十七年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
