body:
  text: 公孫龍子卷下堅白論第五堅白石三可乎曰不可曰二可乎曰可曰何哉曰無堅得白其舉也二無白得堅其舉也二曰得其所白不可謂無白得其所堅不可謂無堅而之石也之於然也非三也曰視不得其所堅而得其所白者無堅也拊不得其所白而得其所堅得其堅也無白也曰天下無白不可以視石天下無堅不可以謂石堅白石不相外藏三可乎曰有自藏也非藏而藏也曰其白也其堅也而石必得以相盛盈其自藏奈何曰得其白得其堅見與不見離不見離一二不相盈故離離也者藏也曰石之白石之堅見與不見二與三若廣修而相盈也其非舉乎曰物白焉不定其所白物堅焉不定其所堅不定者兼惡乎甚石也曰循石非彼無石非石無所取乎白石不相離者固乎然其無已曰於石一也堅白二也而在於石故有知焉有不知焉有見焉故知與不知相與離見與不見相與藏藏故孰謂之不離曰目不能堅手不能白不可謂無堅不可謂無白其異任也其無以代也堅白域於石惡乎離曰堅未與石為堅而物兼未與為堅而堅必堅其不堅石物而堅天下未有若堅而堅藏白固不能自白惡能白石物乎若白者必白則不白物而白焉黃黑與之然石其無有惡取堅白石乎故離也離也者因是力與知果不若因是且猶白以目見目以火見而火不見則火與目不見而神見神不見而見離堅以手而手以捶是捶與手知而不知而神與不知神乎是之謂離焉離也者天下故獨而正名實論第六天地與其所産焉物也物以物其所物而不過焉實也實以實其所實不曠焉位也出其所位非位位其所位焉正也以其所正正其所不正疑其所正其正者正其所實也正其所實者正其名也其名正則唯乎其彼此焉謂彼而彼不唯乎彼則彼謂不行謂此而行不唯乎此則此謂不行其以當不當也不當而亂也故彼彼當乎彼則唯乎彼其謂行彼此此當乎此則唯乎此其謂行此其以當而當也以當而當正也故彼故彼止於彼此此止於此可彼此而彼且此此彼而此且彼不可夫名實謂也知此之非也知此之不在此也明不謂也知彼之非彼也知彼之不在彼也則不謂也至矣哉古之明王審其名實慎其所謂至矣哉古之明王
