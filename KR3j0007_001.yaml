body:
  text: 公孫龍子卷上迹府第一公孫龍六國時辨士也疾名實之散亂因資材之所長為守白之論假物取譬以守白辨謂白馬為非馬也白馬為非馬者言白所以名色言馬所以名形也色非形形非色也夫言色則形不當與言形則色不宜從今合以為物非也如求白馬於廄中無有而有驪色之馬然不可以應有白馬也不可以應有白馬則所求之馬亡矣亡則白馬竟非馬欲推是辨以正名實而化天下焉龍與孔穿會趙平原君家穿曰素聞先生高誼願為弟子久但不取先生以白馬為非馬耳請去此術則穿請為弟子龍曰先生之言悖龍之所以為名者乃以白馬之論爾今使龍去之則無以教焉且欲師之者以智與學不如也今使龍去之此先教而後師之也先教而後師之者悖且白馬非馬乃仲尼之所取龍聞楚王張繁弱之弓載忘歸之矢以射蛟兕於雲夢之圃而喪其弓左右請求之王曰止楚王遺弓楚人得之又何求乎仲尼聞之曰楚王仁義而未遂也亦曰人亡弓人得之而已何必楚若此仲尼異楚人於所謂人夫是仲尼異楚人於所謂人而非龍異白馬於所謂馬悖先生修儒術而非仲尼之所取欲學而使龍去所教則雖百龍固不能當前矣孔穿無以應焉公孫龍趙平原君之客也孔穿孔子之葉也穿與龍會穿謂龍曰臣居魯側聞下風高先生之智説先生之行願受業之日久矣乃今得見然所不取先生者獨不取先生之以白馬為非馬耳請去白馬非馬之學穿請為弟子公孫龍曰先生之言悖龍之學以白馬為非馬者也使龍去之則龍無以教無以教而乃學於龍也者悖且夫欲學於龍者以智與學焉為不逮也今教龍去白馬非馬是先教而後師之也先教而後師之不可先生之所以教龍者似齊王之謂尹文也齊王之謂尹文曰寡人甚好士以齊國無士何也尹文曰願聞大王之所謂士者齊王無以應尹文曰今有人於此事君則忠事親則孝交友則信處鄉則順有此四行可謂士乎齊王曰善此真吾所謂士也尹文曰王得此人肯以為臣乎王曰所願而不可得也是時齊王好勇於是尹文曰使此人廣庭大衆之中見侵侮而終不敢鬭王將以為臣乎王曰巨士也見侮而不鬭辱也辱則寡人不以為臣矣尹文曰唯見侮而不鬭未失其四行也是人未失其四行其所以為士也然而王一以為臣一不以為臣則向之所謂士者乃非士乎齊王無以應尹文曰今有人君將理其國人有非則非之無非則亦非之有功則賞之無功則亦賞之而怨人之不理也可乎齊王曰不可尹文曰臣竊觀下吏之理齊其方若此矣王曰寡人理國信若先生之言人雖不理寡人不敢怨也意未至然與尹文曰言之敢無説乎王之令曰殺人者死傷人者刑人有畏王之令者見侮而終不敢鬭是全王之令也而王曰見侮而不鬭者辱也謂之辱非之也無非而王辱之故因除其籍不以為臣也不以為臣者罰之也此無罪而王罰之也且王辱不敢鬭者必榮敢鬭者也榮敢鬭者是而王是之必以為臣矣必以為臣者賞之也彼無功而王賞之王之所賞吏之所誅也上之所是而法之所非也賞罰是非相與四謬雖十黃帝不能理也齊王無以應焉故龍以子之言有似齊王子知難白馬之非馬不知所以難之説以此猶知好士之名而不知察士之類白馬論第二白馬非馬可乎曰可曰何哉曰馬者所以命形也白者所以命色也命色者非命形也故曰白馬非馬曰有白馬不可謂無馬也不可謂無馬者非馬也有白馬為有馬白之非馬何也曰求馬黃黑馬皆可致求白馬黃黑馬不可致使白馬乃馬也是所求一也所求一者白者不異馬也所求不異如黃黑馬有可有不可何也可與不可其相非明故黃黑馬一也而可以應有馬而不可以應有白馬是白馬之非馬審矣曰以馬之有色為非馬天下非有無色之馬也天下無馬可乎曰馬固有色故有白馬使馬無色有馬如已耳安取白馬故白者非馬也白馬者馬與白也馬與白馬也故曰白馬非馬也曰馬未與白為馬白未與馬為白合馬與白復名白馬是相與以不相與為名未可故曰白馬非馬未可曰以有白馬為有馬謂有白馬為有黃馬可乎曰未可曰以有馬為異有黃馬是異黃馬於馬也異黃馬於馬是以黃馬為非馬以黃馬為非馬而以白馬為有馬此飛者入池而棺槨異處此天下之悖言亂辭也曰有白馬不可謂無馬者離白之謂也不離者有白馬不可謂有馬也故所以為有馬者獨以馬為有馬耳非有白馬為有馬故其為有馬也不可以謂馬馬也曰白者不定所白忘之而可也白馬者言白定所白也定所白者非白也馬者無去取於色故黃黑皆所以應白馬者有去取於色黃黑馬皆所以色去故唯白馬獨可以應耳無去者非有去也故曰白馬非馬
