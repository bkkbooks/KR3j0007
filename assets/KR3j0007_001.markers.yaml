  - {type: variant, offset: 1614, length: 0, content: '', WYG: 不取於白者是不去黄也不去於色則色之與馬非有能去故曰無去者非有去也凡黄白之在馬猶親疎之在人私親而背踈則踈者叛矣踈者離叛則親不能獨存矣故曰白馬非馬是以聖人虛心洞照理無不統懐六合於胸中而靈鑑有餘燭萬象於方寸而其神彌靜故能處親而無親在踈而無踈雖不取於親踈亦不捨於親踈所以四海同親萬國共貫也指物論第三物莫非指而指非指物我殊能莫非相指故曰物莫非指相指者相是非也彼此相推是非混一歸於無指故曰而指非指天下無指物無可以謂物指皆謂是非也所以物非指者凡物之情必相是非天下若無是非之物則無一物而可謂之物是以有物即相是非故物莫可指也非指者天下而物可謂指乎物莫非指而又謂之非指者天下齊焉而物其可謂之指乎物物皆忘相指故指皆非指也指也者天下之所無也物也者天下之所有也以天下之所有為天下之所無未可天下無一日而無物無一物而非適故强以物為指者未可也天下無指而物不可謂指也所以天下無是非者物各適其適不可謂之是非故無是非也不可謂指者非指也譬如水大殊性各適其用既無是非安得謂之是非乎非指者物莫非指也即夫非指之物莫不妄相指也天下無指而物不可謂指者非有非指也物不可謂指者無是非也豈唯無是非乎亦無無是非也故曰非有非指非有非指者物莫非指也物莫非指者而指非指也天下無無是非故萬物莫不相是非故曰非有非指者物莫非指也無是非亦無無是非兩忘之故終日是非而無是非故曰物莫非指者而指非指也天下無指者生於物之各有名不為指也物有其實而各有名謂若王良善御𨽻首善計彼物各自為用譬之耳目廢一不可故不為是非也不為指而謂之指是兼不為指物皆不為指而或謂之指者是彼此之物兼相是非而是非莫定故不為指也以有不為指之無不為指未可之適也有不為指謂物也無不為指謂指也以物適指故未可也且指者天下之所兼或一物而有是非二名或彼此更相為指皆謂之兼也天下無指者物不可謂無指也不可謂無指者非有非指也是非之名生於物相彼故曰物不可謂無指即此萬物無指而又無無指故曰非有非指也非有非指者物莫非指謂無是非者生於物莫非指也是以聖人求人於是非之内乃得無是非人也使天下無物指誰徑謂非指天下無物誰徑為指設使天下無物無指則寂然矣誰為指為非指乎誰謂指為指乎天下有指無物指誰徑謂非指徑謂無物非指設使有指而無物可施指者誰謂有指為非指乎誰謂有無物故非指乎明本無指也且夫指固自為非指奚待於物而乃與為指反覆相推則指自為無指何能與物為指乎明萬物萬殊各自為物各有所宜無是非也是以聖人淵黙恬淡忘是忘非不棄一能不遺一物也通變論第四曰二有一乎曰二無一如白與馬為二物不可合一以為二曰二有右乎曰二無右曰二有左乎曰二無左左右合一位也不可合二以為右亦不可合二以為左明二必無為一之道也曰右可謂二乎曰不可曰左可謂二乎曰不可不可分右以為二亦不可分左以為二明一無為二之道也曰左與右可謂二乎曰可左右異位故可謂二曰謂變非不變可乎曰可一不可謂二二亦不可謂一必矣物有也遷變之道則不可謂之不變曰右有與可謂變乎曰可右有與謂右移於左則是物一而變為異類如鯤化為鵬忠變為逆存亡靡定禍福不居皆是一物化為他類故舉右以明一百變而不改一曰變隻鯤鵬二物隻以變為二矣何得不謂一變為二乎曰右鯤化為鵬一物化為一物如右移於左終是向者之右曰右茍變安可謂右茍不變安可謂變右移於左安可仍謂之右知其一物安可謂之變乎明二可一而一可二也曰二茍無左又無右二者左與右柰何羊合牛非馬假令羊居左牛居右共成一物不可偏謂之羊亦不可偏謂之既無無所名不可合謂之馬謂二物不可為一明矣牛合羊非鷄變為他物如右易位故以牛左羊左亦非牛非羊又非鷄也曰何哉曰羊與牛唯異羊有齒牛無齒而羊牛之非羊也之非牛也未可是不俱有而或類焉牛之無齒不為不足羊之有齒而比於牛為有餘矣以羊之有餘而謂之非羊者未可然羊之有齒不為有餘則牛之無齒而比於羊固不足矣以牛之不足而謂之非牛者亦未可也是皆禀之天然各足於其分而俱適矣故牛自類牛而為牛羊自類羊而為羊也羊有角牛有角牛之而羊也羊之而牛也未可是俱有而類之不同也之而猶之為也以羊牛俱有角因謂牛為羊又謂羊為牛者未可其所以俱有角者天然也而羊牛類異不可相謂也羊牛有角馬無角馬有尾牛羊無尾故曰羊合羊非馬也非馬者無馬也無馬者羊不二牛不二而羊牛二是而羊而牛非馬可也若舉而以是猶類之不同若左右猶是舉馬與牛羊若此之懸故非馬也豈唯非馬乎又羊牛之中無馬矣羊一也不可以謂二矣牛二也不可以為三矣則一羊一牛并之為二可是羊牛不得謂之馬若以羊牛為馬則二可以為三故無馬而后可也所以舉是羊牛者假斯類之不可以定左右之分也左右之分定則上下之位明矣牛羊有毛鷄有羽謂鷄足二數足二二而一故三謂牛羊足一數足四四而一故五牛羊足五鷄足三故曰牛合羊非鷄非有以非鷄也上云羊合牛今曰牛合羊者變文以見左右移位以明君臣易職而變亂生焉人之言曰羊有足牛有足鷄有足而不數其足則以各一足而已然而歴數其足則牛羊各四而鷄二并前所謂一足則牛羊各五足矣夫如是則牛羊與鷄異矣故曰非鷄也非牛羊者鷄以為非鷄而牛羊之中無鷄故非鷄也與馬以鷄寜馬材不材其無以類審矣舉是謂亂名是狂舉馬以譬正鷄以喻亂故等馬與鷄寕取於馬以馬有國用之材而鷄不材其為非類審矣故人君舉是不材而與有材者並位以亂名實謂之狂舉曰他辯曰青以白非黄白以青非碧曰何哉曰青白不相與而相與反對也不相鄰而相鄰不害其方也前以羊牛辯左右共成一體而羊牛各礙於一物不相盈故又責以他物為辯也夫青不與白為青而白不與青為白故曰不相與青者木之色其方在東白者金之色其方在西東西相反而相對也東自極於東西自極於西故曰不相鄰也東西未始不相接不相害故曰相鄰不害其方也不害其方者反而對各當其所若左右不驪驪色之雜者也東西正相反而相對各當其所居若左右之不相雜故不害其方也故一於青不可一於白不可惡乎其有黄矣哉黄其正矣是正舉也其有君臣之於國焉故強夀矣青白各靜其所居不相害故不可合一而謂之青不可合一而為之白夫以青白相辯猶不一於青白安得有黄矣哉然青白之中雖無於黄天下固不可謂無黄也黄正色也天下固有黄矣夫云爾者白以喻君青以喻臣黄以喻國故君臣各正其所舉則國強而君夀矣而且青驪乎白而白不勝白足之勝矣而不勝是木賊金也木賊金者碧碧則非正舉矣白君道也青臣道也青驪於白謂權臣擅命雜君道也君道雜則君不勝矣故曰而白不勝也君之制臣猶金之勝木其來久矣而白不勝為青所驪是木賊金而臣掩君之謂也青染於白其色碧也臣而掩君其道亂也君道之所以亂由君不正舉也青白不相與而相與不相勝則兩明也爭而明其色碧也夫青白不相與之物也今相與雜而不相勝也不相勝者謂青染於白而白不全滅是青不勝白之謂也潔白之質而為青所染是白不勝青之謂也謂之青而白猶不滅謂之白而為青所染是白不勝青之謂也謂之青而白猶不滅謂之白而為青所染兩色並章故曰兩明也者白爭而明也者爭白明俗謂其色碧也與其碧寜黄黄其馬也其與類乎等黄於碧寜取於黄者黄中正之色也馬國用之材也夫中正之德國用之材其亦類矣故寜取於黄以類於馬馬喻中正也碧其鷄也其與暴乎碧不正之色鷄不材之禽故相與為類暴之青而白色碧之材白猶不勝亂暴則君臣争而兩明也兩不明昏不明非正舉也政之所以暴亂者君臣争明也君臣爭明則上下昏亂政令不明不能正其所舉也非正舉者名實無當驪色章焉故曰兩明也兩明而道喪其無有以正焉名者命實者也實者應名者也夫兩儀之大萬物之多君父之尊臣子之賤百官庶府卑髙等列器用資實各有定名聖人司之正舉而不失則地平天成尊卑以序無為而業廣不言而教行若夫名乖於實則實不應名上慢下暴百度昏錯故曰驪色章焉驪色之章則君臣爭明内離外叛正道喪者名實不當也名實之不當則無以及正道之喪也堅白論第五堅白石三可乎曰不可曰一可乎曰可曰何哉曰無堅得白其舉也二無白得堅其舉也二堅也白也石也三物合體而不謂之三者人目視石但見石之白而不見其堅是舉所見石與白二物故曰無堅得白其舉也二矣人手觸石但知石之堅而不知其白是舉石與堅二物故曰無白得堅其舉也二曰得其所白不可謂無白得其所堅不可謂無堅而之石也之於然也非三也之石猶此石堅白共體不可謂之何無堅白既得其堅白不曰非三而曰視不得其所堅而得其所白者無堅也拊不得其所白而得其所堅得其堅也無白也堅非目之所見故曰無堅白非手之所知故曰無白也曰天下無白不可以視石天下無堅不可以謂石堅白石不相外藏三可乎白者色也寄一色則衆色可知天下無有衆色之物而必因色故曰天下無白不可以視石也堅者質也寄一質則剛柔等質例皆可知萬物之質不同而各稱其所受天下未有無質之物而物必因質乃固故曰天下無堅不可以謂石也石者形也舉石之形則衆物之形例皆可知天下未有無形之物而物必因形乃聚然則色形質者相成於一體之中不離也故曰堅白石不相外也而人目之所見手之所觸但得其二不能兼三人自不能兼二不可謂之無三故曰藏三可乎言不可也曰有自藏也非藏而藏也目能見物而不見堅則堅藏矣手能知物而不知白則白藏矣此皆不知所然自然而藏故曰自藏也彼皆自藏非有物藏之之義非實觸但得其二實藏也曰其白也其堅也而石必得以相盛盈其自藏柰何盈滿也其白必滿於堅石之中其堅亦滿於白石之中而石亦滿於堅白之中故曰必得以相盈也二物相盈必一矣柰何謂之自藏也曰得其白得其堅見與不見與不見離一一不相盈故離離也者藏也夫物各有名而名各有實故得白名者自有白之實得堅名者亦有堅之實也然視石者見白之實不見堅之實不見堅之實則堅離於白矣故曰見與不見謂之離則知之與不知亦離矣於石一也堅與白二也此三名有實則不相盈也名不相盈則素離矣素離而不見故謂之藏吕氏春秋曰公孫龍與魯孔穿對辭於趙平原家藏三耳盖以此篇為辯曰石之白石之堅見與不見二與三若廣脩而相盈也其非舉乎脩長也白雖自有實然是石之白也堅雖自有實然是石之堅也故堅白二物與石為三見與不見共為體其堅白廣脩皆與石均而相滿豈非舉三名而合於一實曰物白焉不定其所白物堅焉不定其所堅不定者兼惡乎甚石也萬物通有白是不定白於石也夫堅白豈唯不定於石乎亦兼不定於萬物矣萬物且猶不能定安能獨於與石同體乎曰循石非彼無石非石無所取乎白石不相離者固乎然其無巳賔難主云因循於石知萬物亦與堅同體故曰循石也彼謂堅也非堅則無石矣言必頼於堅以成名也非有於石則無取於白矣言必頼於石然後以見白也此三物者相因乃一體故吾曰堅白不相離也堅白與石猶不相離則萬物之與堅固然不相離其無已矣曰於石一也堅白二也而在於石故有知焉有不知焉有見焉故知與不知相與離見與不見相與藏藏故孰謂之不離以手拊石知堅不知白故知與不知相與離也以目視石見白不見堅故見與不見相與藏也堅藏於目而目不見堅誰謂堅不藏乎白離於手不知於白誰謂白不離乎曰目不能堅手不能白不可謂無堅不可謂無白其異任也其無以代也堅白域於石惡乎離目能視手能操目之與手所在各異故曰其異任也目自不能見於堅不可以手代目之見堅手自不能知於白亦不可以目代手之知白故曰其無以代也堅白相域不相離安得謂之離不相離曰堅未與石為堅而物兼未與物為堅而堅必堅其不堅石物而堅天下未有若堅而堅藏堅者不獨堅於石而亦堅於萬物故曰未與石為堅而物兼也亦不與萬物為堅而固當自為堅故曰未與物為堅而堅必堅也天下未有若此獨立之堅而可見然亦不可謂之為無堅故曰而堅藏也白固不能自白惡能白石物乎若白者必白則不白物而白焉黄黑與之然石其無有惡取堅白石乎故離也離也者因是世無獨立之堅乎亦無孤立之白矣故曰白故不能物白白既不能自白安能自白於石與物故曰惡能自乎若使白者必能自白則亦不待白於物而自白矣豈堅白乎黄黒等色亦皆然也若石與物必待於色然後可見也色既不能自為其色則石亦不能自顯其色矣天下未有無色而可見之物故曰石其無有矣石既無矣堅白安所託哉故曰惡取堅白石反覆相見則堅白之與萬物莫不皆離矣夫離者豈有物使之離乎莫不因是天然而自離矣故曰因是也力與知果不若因是果謂果决也若如也夫不因天然之自離而欲運力與知而離於堅白者果决不得矣故不如因是天然之自離也且猶白以目以火見而火不見則火與目不見而神見神不見而見離神謂精神也人謂目能見物而目以因火見是目不能見由大乃得見也然火非見白之物則目與火俱不見矣然則見者誰乎精神見矣夫精神之見物也必因火以目乃得見矣火目猶且不能為見安能與神而見乎則神亦不能見矣推尋見者竟不得其實則不知見者誰也故曰見而離堅以手而手以捶是捶與手知而不知而神與不知神乎是之謂離焉離也者天下故獨而正手捶與精神不得其知則其所知者彌復不知矣所知而不知神其何為哉夫神者生生之主而心之精爽也然而耳目殊能百骸異通千變萬化神斯主焉而但因耳目之所能任百骸之自通不能使耳見而目聞足操而手歩又於一物之上見白不得堅知堅不得白而况六合之廣萬物之多乎故曰神乎神乎其無知矣神而不知而知離也推此以尋天下則何物而非離乎故物物斯離不相雜也各各趨變不相須也不相須故不假彼以成此不相離故不持此以亂彼是以聖人即物而㝠即事而静故天下安存即物而㝠故物皆得性物皆得性則彼我同親天下安存則名實不存也名實論第六天地與其所産焉物也天地之形及天地之所生者皆謂之物也夫物之為物以物其所物而不過焉實也取材以脩廊廟制以車服器械求賢以實侍御僕從中外職國皆無過差各當其物故謂之實也實以實其所實不曠焉位也實者充實器用之小大衆物之卑髙器得其材人堪其材庶政無闕尊卑有序故曰位也出其所位非位離位使官器用過制或僭於上或濫於下皆非其位位其所位焉正也取材之與制器蒞事之與制賞有尊卑神亦異數合靜其信而不僣濫故謂正也以其所正正其所不正疑其所正以正正於不正則不正者皆正以不正亂於正則衆皆疑之其正者正其所實也正其所實者正其名也仲尼曰必也正名乎故正其實正矣其實正則衆正皆正矣其名正則唯乎其彼此焉唯應辭也正其名者謂施名當於彼此之實故即名求實而後彼此皆應其名謂彼而彼不唯乎彼則彼謂不行謂者教命也發號施命而召於彼而彼不應者分不當於彼故教命不得行也謂此而行不唯乎此則此謂不行施命不當於此故此命不得行其以當不當也不當而亂也教命不當而自以為當者彌不當也故當曰其以當不當也以其命之不當故羣物不應勢其命矣以不當應物之不當命而勢位以威之則天下皆以不當為當所以又亂亂之巳矣故彼彼當乎彼則唯乎彼其謂行彼此此當乎此則唯乎此其謂行此其以當而當也以當而當正也施命於彼此而當彼此之名實故皆應而命行若夫以當則天下自正故彼彼止於彼此此止於此可彼名止於彼實而此名止於此實彼此名實不相濫故曰可彼此而彼且此此彼而此且彼不可或以彼名濫於此實而謂彼且與此相類或以此名濫於彼實而謂此且與彼相同故皆不可夫名實謂也知此之非此也知此之不在此也則不謂也知彼之非彼也知彼之不在彼也則不謂也大名所以希實也故衆政之與實賞刑名當其實乃善也假令知此之大功非此人之功也知此之小功不足在此之可賞也則皆不命賞矣假令知彼之大罪非彼人之罪也知彼之小罪不足在彼之可罰也則皆不命罰矣至矣哉古之明王審其名實慎其所謂至矣哉古之明王公孫龍之作論也假物為辯以敷王道之至大者也夫王道之所謂大者莫大於正名實也仲尼曰惟名與器不可以假人然則名號器實聖人之所重慎之者也名者名於事物以施教者也實者實於事物以成教者也夫名非物也而物無名則無以自通矣物非名也而名無物則無以自明矣是以名因實而立實由名以通故名當於實則名教大行實功大舉王道所以配天而大者也是以古之明王審其名實而慎其施行者也公孫龍子}
